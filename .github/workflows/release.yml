name: Build and Release Plugin Zip

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install gettext and zip
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext zip

      - name: Detect plugin main file and metadata
        id: plugin
        shell: bash
        run: |
          set -euo pipefail

          # Find the first PHP file containing a WordPress plugin header.
          MAIN_FILE="$(grep -rl --include='*.php' '^/\*' . | while read -r file; do
            if grep -qE '^[[:space:]]*\*[[:space:]]+Plugin Name:' "$file" && \
               grep -qE '^[[:space:]]*\*[[:space:]]+Text Domain:' "$file"; then
              echo "$file"
              break
            fi
          done)"

          if [ -z "${MAIN_FILE:-}" ]; then
            echo "No plugin main file found."
            exit 1
          fi

          # Folder name inside the zip comes from the main file basename.
          PLUGIN_FOLDER="$(basename "$(dirname "$MAIN_FILE")")"
          if [ "$PLUGIN_FOLDER" = "." ]; then
            PLUGIN_FOLDER="$(basename "$MAIN_FILE" .php)"
          fi

          PLUGIN_FILE="$(basename "$MAIN_FILE")"

          TEXT_DOMAIN="$(awk -F': ' '/Text Domain:/ {gsub(/\r/, "", $2); print $2; exit}' "$MAIN_FILE")"
          VERSION="$(awk -F': ' '/Version:/ {gsub(/\r/, "", $2); print $2; exit}' "$MAIN_FILE")"
          PLUGIN_NAME="$(awk -F': ' '/Plugin Name:/ {sub(/^ +/, "", $2); gsub(/\r/, "", $2); print $2; exit}' "$MAIN_FILE")"

          if [ -z "${TEXT_DOMAIN:-}" ]; then
            echo "Text Domain not found in $MAIN_FILE"
            exit 1
          fi

          if [ -z "${VERSION:-}" ]; then
            echo "Version not found in $MAIN_FILE"
            exit 1
          fi

          echo "main_file=$MAIN_FILE" >> "$GITHUB_OUTPUT"
          echo "plugin_folder=$PLUGIN_FOLDER" >> "$GITHUB_OUTPUT"
          echo "plugin_file=$PLUGIN_FILE" >> "$GITHUB_OUTPUT"
          echo "text_domain=$TEXT_DOMAIN" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "plugin_name=$PLUGIN_NAME" >> "$GITHUB_OUTPUT"

      - name: Build translation files
        shell: bash
        run: |
          set -euo pipefail

          if [ -d "languages" ]; then
            find languages -name '*.po' -print0 | while IFS= read -r -d '' po; do
              mo="${po%.po}.mo"
              msgfmt -o "$mo" "$po"
            done
          fi

      - name: Create zip archive
        shell: bash
        run: |
          set -euo pipefail

          REPO_NAME="${{ github.event.repository.name }}"
          ZIP_NAME="${REPO_NAME}-v${{ steps.plugin.outputs.version }}.zip"
          PLUGIN_FOLDER="${{ steps.plugin.outputs.plugin_folder }}"
          MAIN_FILE="${{ steps.plugin.outputs.main_file }}"

          # Create a staging directory so the zip contains one top-level folder.
          STAGING_DIR="$(mktemp -d)"
          mkdir -p "$STAGING_DIR/$PLUGIN_FOLDER"

          # Copy repository contents into the plugin folder.
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.idea' \
            --exclude 'build.sh' \
            ./ "$STAGING_DIR/$PLUGIN_FOLDER/"

          # Remove any existing zip with the same name.
          rm -f "$ZIP_NAME"

          # Build the zip from the staging directory, with the plugin folder name inside it.
          cd "$STAGING_DIR"
          zip -r "$GITHUB_WORKSPACE/$ZIP_NAME" "$PLUGIN_FOLDER" \
            -x "$PLUGIN_FOLDER/.git*" \
            -x "$PLUGIN_FOLDER/.idea*" \
            -x "$PLUGIN_FOLDER/.github/*" \
            -x "$PLUGIN_FOLDER/build.sh"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ github.event.repository.name }}-v${{ steps.plugin.outputs.version }}.zip
          name: ${{ steps.plugin.outputs.plugin_name }} v${{ steps.plugin.outputs.version }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
